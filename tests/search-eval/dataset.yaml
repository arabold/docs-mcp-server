# Search-quality benchmark dataset.
#
# status: draft — entries were authored from a mix of common community questions
# and my own knowledge of each library's docs structure. Every entry needs a
# human pass before this dataset becomes the official baseline. The URLs use
# canonical doc-site paths; if a library has been reorganised, fix the URL and
# update the grade.
#
# Grades:
#   3 = canonical doc page for the query
#   2 = closely related / partial answer
#   1 = peripheral / supporting context
#
# Intents:
#   api-lookup, conceptual, comparison, troubleshooting

status: draft
notes: |
  Authored 2026-05-17 as initial dataset for the redesigned benchmark.
  Review checklist:
    - [ ] Confirm each URL is reachable and is the right canonical page for the query.
    - [ ] Confirm grades reflect how an expert would rank docs for that query.
    - [ ] Add or remove queries to match real user prompts you've seen.
    - [ ] Once reviewed, change `status: draft` → `status: reviewed` and re-record baseline.

